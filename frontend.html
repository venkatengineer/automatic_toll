<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Finder | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.2;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .status-container {
            margin: 2rem 0;
            min-height: 80px;
        }

        .coordinates {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 16px;
            font-family: 'Monaco', monospace;
            font-size: 0.9rem;
            display: none;
            border: 1px solid var(--border);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .maps-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 1.5rem;
            display: inline-block;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .maps-link:hover {
            text-decoration: underline;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="container">
        <div class="card">
            <h1>Locate Me</h1>
            <p>Get your precise coordinates and sync with the secure portal.</p>
            
            <button id="get-btn" class="btn" onclick="shareLocation()">
                <div id="loader" class="loader"></div>
                <span id="btn-text">Share My Location</span>
            </button>

            <div class="status-container">
                <div id="coords" class="coordinates">
                    LAT: <span id="lat">--</span><br>
                    LON: <span id="lon">--</span>
                </div>
                <div id="status-msg" style="margin-top: 1rem; font-size: 0.85rem;"></div>
                <a id="maps-link" href="#" target="_blank" class="maps-link" style="display: none;">View on Google Maps →</a>
            </div>
        </div>
    </div>

    <script>
        async function shareLocation() {
            const btn = document.getElementById('get-btn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btn-text');
            const coordsPanel = document.getElementById('coords');
            const statusMsg = document.getElementById('status-msg');
            const mapsLink = document.getElementById('maps-link');

            // Reset UI functions
            function resetButton() {
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = 'Share My Location';
            }

            function showError(msg) {
                statusMsg.innerText = msg;
                statusMsg.style.color = "#f87171";
                resetButton();
            }

            // Reset UI state
            btn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'Locating...';
            statusMsg.innerText = '';
            statusMsg.style.color = '#94a3b8';

            if (!navigator.geolocation) {
                showError("Geolocation is not supported by your browser.");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                
                // Update Local UI
                document.getElementById('lat').innerText = latitude.toFixed(6);
                document.getElementById('lon').innerText = longitude.toFixed(6);
                coordsPanel.style.display = 'block';
                mapsLink.href = `https://www.google.com/maps?q=${latitude},${longitude}`;
                mapsLink.style.display = 'inline-block';

                try {
                    statusMsg.innerText = "Syncing with secure server...";
                    const response = await fetch("/location", { // Using relative path
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ lat: latitude, lon: longitude })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        statusMsg.innerText = "✓ Sync successful: " + data.message;
                        statusMsg.style.color = "#4ade80";
                    } else {
                        throw new Error("Server responded with error");
                    }
                } catch (err) {
                    statusMsg.innerText = "⚠ Connected local, but sync failed.";
                    statusMsg.style.color = "#f87171";
                } finally {
                    resetButton();
                }

            }, (err) => {
                showError("Access denied or timeout. Please check permissions.");
                resetButton();
            }, { enableHighAccuracy: true, timeout: 10000 });
        }
    </script>
</body>
</html>
