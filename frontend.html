<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { background: #4f46e5; transform: translateY(-2px); }
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .maps-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 1.5rem;
            display: inline-block;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .maps-link:hover {
            text-decoration: underline;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="container">
        <div class="card">
            <h1>Locate Me</h1>
            <p>Get your precise coordinates and sync with the secure portal.</p>
            
            <button id="get-btn" class="btn" onclick="shareLocation()">
                <div id="loader" class="loader"></div>
                <span id="btn-text">Share My Location</span>
            </button>

            <div class="status-container">
                <div id="coords" class="coordinates">
                    LAT: <span id="lat">--</span><br>
                    LON: <span id="lon">--</span>
                </div>
                <div id="status-msg" style="margin-top: 1rem; font-size: 0.85rem;"></div>
                <a id="maps-link" href="#" target="_blank" class="maps-link" style="display: none;">View on Google Maps →</a>
            </div>
        </div>
    </div>

    <script>
        async function shareLocation() {
            const btn = document.getElementById('get-btn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btn-text');
            const coordsPanel = document.getElementById('coords');
            const statusMsg = document.getElementById('status-msg');
            const mapsLink = document.getElementById('maps-link');

            // Reset UI
            btn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'Locating...';
            statusMsg.innerText = '';
            statusMsg.style.color = '#94a3b8';

            if (!navigator.geolocation) {
                showError("Geolocation is not supported by your browser.");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                
                // Update Local UI
                document.getElementById('lat').innerText = latitude.toFixed(6);
                document.getElementById('lon').innerText = longitude.toFixed(6);
                coordsPanel.style.display = 'block';
                mapsLink.href = `https://www.google.com/maps?q=${latitude},${longitude}`;
                mapsLink.style.display = 'inline-block';

                try {
                    // Sync with Backend
                    statusMsg.innerText = "Syncing with secure server...";
                    const response = await fetch("http://127.0.0.1:5000/location", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ lat: latitude, lon: longitude })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        statusMsg.innerText = "✓ Sync successful: " + data.message;
                        statusMsg.style.color = "#4ade80";
                    } else {
                        throw new Error("Server responded with error");
                    }
                } catch (err) {
                    statusMsg.innerText = "⚠ Connected local, but sync failed.";
                    statusMsg.style.color = "#f87171";
                } finally {
                    resetButton();
                }
            );
        }
    </script>
</body>
</html>
