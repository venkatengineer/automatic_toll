<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 2.5rem; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 400px; text-align: center;
        }
        .tabs { display: flex; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; padding: 10px; cursor: pointer; color: #94a3b8; font-weight: 600; transition: 0.3s; }
        .tab.active { color: #6366f1; border-bottom: 2px solid #6366f1; }
        input, select {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; font-family: inherit;
        }
        select option { background: #1e1b4b; }
        button {
            width: 100%; background: #6366f1; color: white; border: none; padding: 12px;
            border-radius: 12px; cursor: pointer; font-weight: 600; margin-top: 20px; transition: 0.3s;
        }
        button:hover { background: #4f46e5; }
        .error { color: #f87171; font-size: 0.85rem; margin-top: 10px; }
        .success { color: #4ade80; font-size: 0.85rem; margin-top: 10px; }
        .form-section { display: none; }
        .form-section.active { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="tabs">
            <div id="tab-login" class="tab active" onclick="showForm('login')">Login</div>
            <div id="tab-register" class="tab" onclick="showForm('register')">Register</div>
        </div>

        <div id="login-form" class="form-section active">
            <h2>Secure Login</h2>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem;">Sign in to access your portal</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <div id="login-error" class="error"></div>
            <button onclick="login()">Login</button>
        </div>

        <div id="register-form" class="form-section">
            <h2>User Registration</h2>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem;">Create your account</p>
            <input type="text" id="reg-username" placeholder="Username">
            <input type="password" id="reg-password" placeholder="Password">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="reg-plate" placeholder="Number Plate">
                <select id="reg-type">
                    <option value="" disabled selected>Vehicle Type</option>
                    <option value="Car">Car</option>
                    <option value="Truck">Truck</option>
                    <option value="Bike">Bike</option>
                    <option value="Bus">Bus</option>
                </select>
            </div>
            <input type="tel" id="reg-phone" placeholder="Phone Number">
            <input type="text" id="reg-aadhar" placeholder="Aadhar Number (12 digits)">
            <div id="reg-msg" class="error"></div>
            <button onclick="register()">Create Account</button>
        </div>
    </div>

    <script>
        function showForm(type) {
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(type + '-form').classList.add('active');
            document.getElementById('tab-' + type).classList.add('active');
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('login-error');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = data.redirect || '/';
                } else {
                    error.innerText = data.message;
                }
            } catch (err) {
                error.innerText = "Connection failed";
            }
        }

        async function register() {
            const msg = document.getElementById('reg-msg');
            const data = {
                username: document.getElementById('reg-username').value,
                password: document.getElementById('reg-password').value,
                number_plate: document.getElementById('reg-plate').value,
                vehicle_type: document.getElementById('reg-type').value,
                phone: document.getElementById('reg-phone').value,
                aadhar: document.getElementById('reg-aadhar').value
            };

            if (!data.username || !data.password || !data.number_plate || !data.phone || !data.aadhar) {
                msg.innerText = "All fields are required";
                msg.className = "error";
                return;
            }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    msg.innerText = "✓ Registration Successful! Switching to Login...";
                    msg.className = "success";
                    setTimeout(() => showForm('login'), 2000);
                } else {
                    msg.innerText = result.message;
                    msg.className = "error";
                }
            } catch (err) {
                msg.innerText = "Connection failed";
                msg.className = "error";
            }
        }
    </script>
</body>
</html>
