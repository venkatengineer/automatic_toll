<!DOCTYPE html>
<html>

<head>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body>

<h2>Tracking Location...</h2>

<script>

// Firebase config
var firebaseConfig = {
apiKey: "AIzaSyD7UoIbBElF_IKNsPJrMlsSW1Ofw5hvi_U",
authDomain: "automatictoll-623fa.firebaseapp.com",
databaseURL: "https://automatictoll-623fa-default-rtdb.firebaseio.com",
projectId: "automatictoll-623fa",
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

function sendLocation(position){

var lat = position.coords.latitude;
var lon = position.coords.longitude;

db.ref("device/location").set({
latitude: lat,
longitude: lon,
timestamp: Date.now()
});

}

// continuously track
navigator.geolocation.watchPosition(sendLocation);

</script>

</body>
</html>
